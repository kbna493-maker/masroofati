:root{
  --primary:#1D4ED8;
  --primary-dark:#0F172A;
  --primary-light:#DBEAFE;
  --text-dark:#0F172A;
  --text-muted:#64748B;
  --bg:#F6F8FC;
  --card:#FFFFFF;
  --border:#E5EAF3;
  --green:#22C55E;
  --red:#EF4444;
  --shadow-soft:0 10px 30px rgba(15,23,42,0.06);
}


/* Global */
body{
  background:linear-gradient(180deg,#F8FAFC 0%, #F1F5F9 100%);
  color:var(--text-dark);
}

/* Cards */
.card{
  background:rgba(255,255,255,0.92);
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(12px);
}

/* Main blue card */
.balance-card{background:linear-gradient(135deg,#0f172a 0%, #1e293b 35%, #2563eb 75%, #60a5fa 100%) !important;color:white;border:none;box-shadow:0 18px 40px rgba(15,23,42,.18) !important}

/* Buttons */
.fab{width:56px !important;height:56px !important;min-width:56px !important;min-height:56px !important;bottom:92px !important;position:fixed;left:50%;transform:translateX(-50%);border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%, #1e293b 35%, #2563eb 75%, #60a5fa 100%) !important;color:#fff !important;box-shadow:0 10px 22px rgba(37,99,235,0.24) !important;z-index:120 !important;opacity:1 !important;visibility:visible !important;filter:none !important}
.fab:hover{
  background:linear-gradient(180deg,var(--primary-dark),#1e40af);
}

/* Chips */
.chip{
  border:1px solid var(--border);
  background:#fff;
  color:var(--text-dark);
  border-radius:20px;
  box-shadow:0 6px 18px rgba(15,23,42,0.04);
}
.chip.active{background:linear-gradient(135deg,#0f172a 0%, #1e293b 35%, #2563eb 75%, #60a5fa 100%) !important;color:#fff !important;border:1px solid transparent !important;outline:none !important;box-shadow:0 12px 24px rgba(37,99,235,.20) !important}

/* Inputs */
.input{
  border:1px solid var(--border);
  background:#fff;
  color:var(--text-dark);
  border-radius:20px;
  box-shadow:0 6px 18px rgba(15,23,42,0.04);
}

/* Text tweaks */
.section-title{
  color:var(--text-dark);
  font-weight:800;
  letter-spacing:-0.2px;
}

      'بيت': { icon:'🏠', color:'#0f766e' }, 'رصيد': { icon:'💰', color:'#059669' }, 'راتب': { icon:'💵', color:'#16a34a' },
      'عمل إضافي': { icon:'🧰', color:'#2563eb' }, 'بيع': { icon:'🏷️', color:'#ea580c' }, 'هدية': { icon:'🎁', color:'#db2777' },

    const app=document.getElementById('app');

    function loadSettings(){
      try{
        const saved=localStorage.getItem(SETTINGS_KEY);
        return saved ? JSON.parse(saved) : {
          showDotOnToday:true,
          compactCards:false,
          darkMode:false,
          notifications:{
            afternoon:true,
            evening:true,
            activity:true,
            spendAlert:true,
            permission:'default',
            lastAfternoonDate:'',
            lastEveningDate:'',
            lastActivityDate:'',
            lastSpendAlertDate:''
          }
        };
      }catch{
        return {
          showDotOnToday:true,
          compactCards:false,
          darkMode:false,
          notifications:{
            afternoon:true,
            evening:true,
            activity:true,
            spendAlert:true,
            permission:'default',
            lastAfternoonDate:'',
            lastEveningDate:'',
            lastActivityDate:'',
            lastSpendAlertDate:''
          }
        };
      }
    }
    function saveSettings(){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }

    function ensureNotificationSettings(){
      if(!settings.notifications) settings.notifications={};
      settings.notifications.afternoon = true;
      settings.notifications.evening = true;
      settings.notifications.activity = true;
      settings.notifications.spendAlert = true;
      settings.notifications.permission = settings.notifications.permission || 'default';
      settings.notifications.lastAfternoonDate = settings.notifications.lastAfternoonDate || '';
      settings.notifications.lastEveningDate = settings.notifications.lastEveningDate || '';
      settings.notifications.lastActivityDate = settings.notifications.lastActivityDate || '';
      settings.notifications.lastSpendAlertDate = settings.notifications.lastSpendAlertDate || '';
    }
    function loadNotificationCenter(){
      try{
        const saved=localStorage.getItem(NOTIFICATION_CENTER_KEY);
        return saved ? JSON.parse(saved) : [];
      }catch{
        return [];
      }
    }
    function saveNotificationCenter(){ localStorage.setItem(NOTIFICATION_CENTER_KEY, JSON.stringify(notificationCenter)); }
    function nowStamp(){
      const d = new Date();
      return d.toLocaleString('en-GB');
    }
    function todayStr(){
      const d = new Date();
      return d.toISOString().slice(0,10);
    }
    function addNotificationItem(title, body, type){
      notificationCenter.unshift({id:Date.now()+Math.random(), title, body, type:type||'general', createdAt:new Date().toISOString(), read:false});
      notificationCenter = notificationCenter.slice(0,50);
      saveNotificationCenter();
    }
    async function sendBrowserNotification(title, body){
      try{
        if(!('Notification' in window)) return false;
        if(Notification.permission !== 'granted') return false;
        if('serviceWorker' in navigator){
          const reg = await navigator.serviceWorker.getRegistration();
          if(reg){
            reg.showNotification(title, { body, tag:'masroofati-'+Date.now(), icon:'./icons/icon-192.png' });
            return true;
          }
        }
        new Notification(title, { body });
        return true;
      }catch(e){
        return false;
      }
    }
    async function notifyUser(title, body, type){
      addNotificationItem(title, body, type);
      await sendBrowserNotification(title, body);
      render();
    }
    async function requestNotificationPermission(){
      try{
        if(!('Notification' in window)){
          showToast('الإشعارات غير مدعومة على هذا الجهاز');
          return;
        }
        const result = await Notification.requestPermission();
        settings.notifications.permission = result;
        saveSettings();
        if(result === 'granted'){
          await notifyUser('تم تفعيل الإشعارات','الإشعارات الذكية أصبحت مفعلة على جهازك.','system');
          showToast('تم تفعيل إشعارات التطبيق');
        }else{
          showToast('لم يتم منح إذن الإشعارات');
        }
        render();
      }catch(e){
        showToast('تعذر تفعيل الإشعارات');
      }
    }
    function openNotifications(){
      previousScreen = screen || 'home';
      markNotificationsRead();
      screen='notifications';
      render();
    }
    function markNotificationsRead(){
      notificationCenter = notificationCenter.map(item=>({...item, read:true}));
      saveNotificationCenter();
    }
    function unreadNotificationCount(){
      return notificationCenter.filter(item=>!item.read).length;
    }
    function updateNotificationSetting(key, value){
      ensureNotificationSettings();
      settings.notifications[key]=value;
      saveSettings();
      render();
    }
    function todayTransactionsCount(){
      return transactions.filter(t=>sameDay(t.createdAt, new Date())).length;
    }
    function recentDailyExpenseAverage(days){
      const today = normalizeDate(new Date());
      let total = 0;
      for(let i=0;i<days;i++){
        const d = new Date(today);
        d.setDate(today.getDate()-i);
        total += transactions.filter(t=>t.type==='EXPENSE' && sameDay(t.createdAt, d)).reduce((s,t)=>s+t.amount,0);
      }
      return total / Math.max(days,1);
    }
    function scheduleActivityAnchor(){ window.__masroofatiLastVisibleAt = Date.now(); }
    async function checkSmartReminders(){
      ensureNotificationSettings();
      const now = new Date();
      const hour = now.getHours();
      const today = todayStr();
      const noTxToday = todayTransactionsCount()===0;

      if(settings.notifications.afternoon && noTxToday && hour>=16 && settings.notifications.lastAfternoonDate!==today){
        settings.notifications.lastAfternoonDate=today;
        saveSettings();
        await notifyUser('تذكير العصر','لسه ما سجلت أي مصروف اليوم. سجّل نفقاتك قبل ما تنساها.','reminder');
      }

      if(settings.notifications.evening && noTxToday && hour>=21 && settings.notifications.lastEveningDate!==today){
        settings.notifications.lastEveningDate=today;
        saveSettings();
        await notifyUser('تذكير المساء','سجل مصاريف اليوم قبل نهاية اليوم.','reminder');
      }

      if(settings.notifications.activity && noTxToday && window.__masroofatiLastVisibleAt){
        const mins = Math.floor((Date.now()-window.__masroofatiLastVisibleAt)/60000);
        if(mins>=25 && settings.notifications.lastActivityDate!==today){
          settings.notifications.lastActivityDate=today;
          saveSettings();
          await notifyUser('تذكير سريع','فتحت التطبيق ولسه ما سجلت شيئًا اليوم. يمكن في مصروف نسيته؟','activity');
        }
      }
    }
    function normalizeDate(date){ const d=new Date(date); d.setHours(0,0,0,0); return d; }
    function monthDays(dateRef){
      const year=dateRef.getFullYear(), month=dateRef.getMonth();
      const lastDay=new Date(year, month+1, 0).getDate();
      return Array.from({length:lastDay}, (_,i)=>normalizeDate(new Date(year, month, i+1)));
    }
    function loadTransactions(){
      try{
        const saved=localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : sampleTransactions.slice();
      }catch{
        return sampleTransactions.slice();
      }
    }
    function loadDebts(){
      try{
        const saved=localStorage.getItem(DEBTS_KEY);
        return saved ? JSON.parse(saved) : [];
      }catch{
        return [];
      }
    }
    function loadPeople(){
      try{
        const saved=localStorage.getItem(PEOPLE_KEY);
        return saved ? JSON.parse(saved) : [];
      }catch{
        return [];
      }
    }
    function vibrateFeedback(){
      try{
        if(navigator.vibrate) navigator.vibrate(35);
      }catch(e){}
    }
    function showSuccessMark(){
      const overlay=document.getElementById('successOverlay');
      if(!overlay) return;
      overlay.classList.add('show');
      clearTimeout(window.__successOverlayTimer);
      window.__successOverlayTimer=setTimeout(()=>overlay.classList.remove('show'), 800);
    }
    function playSuccessSound(){
      try{
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if(!AudioCtx) return;
        const ctx = window.__masroofatiAudioCtx || new AudioCtx();
        window.__masroofatiAudioCtx = ctx;

        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = 'square';
        osc.frequency.setValueAtTime(620, now);
        osc.frequency.linearRampToValueAtTime(920, now + 0.08);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.38, now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start(now);
        osc.stop(now + 0.22);
      }catch(e){}
    }
    function saveTransactions(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions)); }
    function saveDebts(){ localStorage.setItem(DEBTS_KEY, JSON.stringify(debts)); }
    function savePeople(){ localStorage.setItem(PEOPLE_KEY, JSON.stringify(peoplePages)); }
    function fmt(n,currency){
      const value=Number(n||0);
      const text=Number.isInteger(value)?value.toLocaleString('en-US'):value.toLocaleString('en-US',{maximumFractionDigits:2});
      return currency==='SYP'?`${text} ل.س`:`${text} $`;
    }
    function sameDay(a,b){
      const da=new Date(a), db=new Date(b);
      return da.getFullYear()===db.getFullYear() && da.getMonth()===db.getMonth() && da.getDate()===db.getDate();
    }
    function sameMonth(a,b){
      const da=new Date(a), db=new Date(b);
      return da.getFullYear()===db.getFullYear() && da.getMonth()===db.getMonth();
    }
    function debtDateLabel(iso){
      const d=new Date(iso);
      return d.toLocaleDateString('en-GB');
    }
    function dayLabel(iso){
      const d=new Date(iso), now=new Date(), y=new Date();
      y.setDate(now.getDate()-1);
      if(sameDay(d,now)) return 'اليوم';
      if(sameDay(d,y)) return 'أمس';
      return d.toLocaleDateString('en-GB');
    }
    function topDateLabel(date){ return `${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`; }
    function calc(currency,dateRef=selectedDate){
      const list=transactions.filter(t=>t.currency===currency);
      const income=list.filter(t=>t.type==='INCOME').reduce((s,t)=>s+t.amount,0);
      const expense=list.filter(t=>t.type==='EXPENSE').reduce((s,t)=>s+t.amount,0);
      const dayIncome=list.filter(t=>t.type==='INCOME' && sameDay(t.createdAt,dateRef)).reduce((s,t)=>s+t.amount,0);
      const dayExpense=list.filter(t=>t.type==='EXPENSE' && sameDay(t.createdAt,dateRef)).reduce((s,t)=>s+t.amount,0);
      const monthIncome=list.filter(t=>t.type==='INCOME' && sameMonth(t.createdAt,dateRef)).reduce((s,t)=>s+t.amount,0);
      const monthExpense=list.filter(t=>t.type==='EXPENSE' && sameMonth(t.createdAt,dateRef)).reduce((s,t)=>s+t.amount,0);
      return {balance:income-expense,dayIncome,dayExpense,monthIncome,monthExpense};
    }
    function getDisplayCategory(tx){ return (tx.category==='أخرى' && tx.customName) ? tx.customName : tx.category; }
    function iconBadge(category){
      const meta = categoryMeta[category] || categoryMeta['أخرى'];
      return '<span class="cat-icon" style="background:'+meta.color+'">'+meta.icon+'</span>';
    }
    function debtSummary(kind,currency){
      return debts.filter(d=>d.kind===kind && d.currency===currency && !d.paid).reduce((s,d)=>s+d.amount,0);
    }
    function personDebtSummary(name){
      const list = debts.filter(d=>d.personName===name && !d.paid);
      return {
        toMeSYP:list.filter(d=>d.kind==='TO_ME'&&d.currency==='SYP').reduce((s,d)=>s+d.amount,0),
        toMeUSD:list.filter(d=>d.kind==='TO_ME'&&d.currency==='USD').reduce((s,d)=>s+d.amount,0),
        onMeSYP:list.filter(d=>d.kind==='ON_ME'&&d.currency==='SYP').reduce((s,d)=>s+d.amount,0),
        onMeUSD:list.filter(d=>d.kind==='ON_ME'&&d.currency==='USD').reduce((s,d)=>s+d.amount,0)
      };
    }
    function uniquePeople(){
      return [...new Set([...(peoplePages||[]), ...debts.map(d=>d.personName).filter(Boolean)])].sort((a,b)=>a.localeCompare(b,'ar'));
    }
    function sortDebtsForView(list){
      return list.slice().sort((a,b)=>{
        if(!!a.paid !== !!b.paid) return a.paid ? 1 : -1;
        if(a.paid && b.paid){
          const ap = a.paidAt ? new Date(a.paidAt).getTime() : 0;
          const bp = b.paidAt ? new Date(b.paidAt).getTime() : 0;
          return bp - ap;
        }
        return new Date(b.date).getTime() - new Date(a.date).getTime();
      });
    }
    function personSuggestions(){
      const q=(debtSearch||'').trim().toLowerCase();
      if(!q) return [];
      return uniquePeople().filter(name=>name.toLowerCase().includes(q)).slice(0,6);
    }
    function selectDebtSuggestion(name){
      debtSearch=name;

      render();
    }
    function escapeJs(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

    function setScreen(next){
      const navOrder = ['home','debts','reports','settings'];
      const normalize = s => {
        if(s==='person' || s==='addDebt' || s==='addPerson') return 'debts';
        if(s==='history') return 'settings';
        if(s==='notifications') return previousScreen || 'home';
        return s;
      };
      const current = normalize(screen);
      const target = normalize(next);

      if(current===target){
        return;
      }

      const fromIndex = navOrder.indexOf(current);
      const toIndex = navOrder.indexOf(target);
      navTransitionClass = '';
      if(fromIndex!==-1 && toIndex!==-1){
        navTransitionClass = toIndex > fromIndex ? 'slide-left' : (toIndex < fromIndex ? 'slide-right' : '');
      }
      if(next!=='settings') previousScreen=screen;
      screen=next;

      if(editingId!=null){ transactions = transactions.map(t => t.id===editingId ? {...t, ...data} : t); editingId=null; }
      else { transactions.unshift({id:Date.now(),createdAt:selectedDate.toISOString(),...data}); }
      saveTransactions();
      const backTo = txReturnScreen || 'home';
      previousScreen='home';
      screen = backTo;

      playSuccessSound();
      vibrateFeedback();
      txReturnScreen='home';

      if(data.type==='EXPENSE' && settings.notifications && settings.notifications.spendAlert){
        const todayExpense = transactions.filter(t=>t.type==='EXPENSE' && sameDay(t.createdAt,new Date())).reduce((s,t)=>s+t.amount,0);
        const avg = recentDailyExpenseAverage(7);
        const today = todayStr();
        if(todayExpense > Math.max(avg*1.35, 0) && todayExpense > 0 && settings.notifications.lastSpendAlertDate!==today){
          settings.notifications.lastSpendAlertDate = today;
          saveSettings();
          notifyUser('تنبيه صرف','مصروفك اليوم أعلى من المعتاد. راجع نفقاتك قبل أن تزيد أكثر.','spend');

    function reportsView(){
      const monthTx = transactions.filter(t=>sameMonth(t.createdAt, selectedDate));
      const monthExpenses = monthTx.filter(t=>t.type==='EXPENSE');
      const monthIncome = monthTx.filter(t=>t.type==='INCOME');
      const prevMonthDate = new Date(selectedDate.getFullYear(), selectedDate.getMonth()-1, 1);
      const prevMonthTx = transactions.filter(t=>sameMonth(t.createdAt, prevMonthDate));
      const prevMonthExpenseTotal = prevMonthTx.filter(t=>t.type==='EXPENSE').reduce((s,t)=>s+t.amount,0);
      const currentMonthExpenseTotal = monthExpenses.reduce((s,t)=>s+t.amount,0);
      const currentMonthIncomeTotal = monthIncome.reduce((s,t)=>s+t.amount,0);
      const currentMonthNet = currentMonthIncomeTotal - currentMonthExpenseTotal;
      const topExpenseTx = monthExpenses.length ? monthExpenses.slice().sort((a,b)=>b.amount-a.amount)[0] : null;

      const categoryTotals = {};
      monthExpenses.forEach(t=>{ categoryTotals[t.category]=(categoryTotals[t.category]||0)+t.amount; });
      const sortedCategories = Object.entries(categoryTotals).sort((a,b)=>b[1]-a[1]);
      const topCategory = sortedCategories[0] || null;
      const secondCategory = sortedCategories[1] || null;

      const dayTotals = {};
      monthExpenses.forEach(t=>{
        const key = new Date(t.createdAt).toISOString().slice(0,10);
        dayTotals[key]=(dayTotals[key]||0)+t.amount;
      });
      const topDay = Object.entries(dayTotals).sort((a,b)=>b[1]-a[1])[0] || null;

      const activeDebts = debts.filter(d=>!d.paid);
      const toMeActive = activeDebts.filter(d=>d.kind==='TO_ME');
      const onMeActive = activeDebts.filter(d=>d.kind==='ON_ME');
      const debtByPerson = {};
      activeDebts.forEach(d=>{ debtByPerson[d.personName]=(debtByPerson[d.personName]||0)+d.amount; });
      const topDebtPerson = Object.entries(debtByPerson).sort((a,b)=>b[1]-a[1])[0] || null;

      const avg7 = recentDailyExpenseAverage(7);
      const todayExpense = transactions.filter(t=>t.type==='EXPENSE' && sameDay(t.createdAt,new Date())).reduce((s,t)=>s+t.amount,0);
      const monthDaysWithSpend = Object.keys(dayTotals).length;
      const compareRatio = prevMonthExpenseTotal>0 ? ((currentMonthExpenseTotal-prevMonthExpenseTotal)/prevMonthExpenseTotal)*100 : 0;

      const spendingMood = currentMonthExpenseTotal===0 ? 'هادئ جدًا'
        : currentMonthNet >= 0 ? 'متوازن'
        : 'مضغوط';

      const compareText = prevMonthExpenseTotal===0
        ? 'هذا أول شهر واضح للقياس داخل التطبيق.'
        : (currentMonthExpenseTotal>prevMonthExpenseTotal
          ? 'مصروف هذا الشهر أعلى من الشهر الماضي بحوالي '+Math.abs(compareRatio).toFixed(0)+'٪.'
          : 'مصروف هذا الشهر أقل من الشهر الماضي بحوالي '+Math.abs(compareRatio).toFixed(0)+'٪.');

      function panelSpending(){
        const biggestAdvice = topCategory

          : 'ابدأ بتسجيل العمليات بشكل مستمر حتى تصبح قراءة المحلل أذكى وأدق.';
        return '<div class="insight-panel">'
          + '<div class="insight-head"><div><div class="insight-head-title">تحليل الإنفاق</div><div class="insight-head-sub">قراءة أذكى وأقوى لنمط صرفك، مع ملاحظات تركز على أكثر نقطة تؤثر عليك الآن.</div></div><div class="smart-badge">إنفاق</div></div>'
          + '<div class="insight-kpis">'
          + '<div class="insight-kpi"><div class="insight-kpi-label">إجمالي مصروف الشهر</div><div class="insight-kpi-value">'+fmt(currentMonthExpenseTotal,'SYP')+'</div></div>'
          + '<div class="insight-kpi"><div class="insight-kpi-label">صافي الشهر</div><div class="insight-kpi-value">'+fmt(currentMonthNet,'SYP')+'</div></div>'
          + '<div class="insight-kpi"><div class="insight-kpi-label">أعلى عملية</div><div class="insight-kpi-value">'+(topExpenseTx?fmt(topExpenseTx.amount, topExpenseTx.currency):'لا يوجد')+'</div></div>'
          + '<div class="insight-kpi"><div class="insight-kpi-label">مزاج الإنفاق</div><div class="insight-kpi-value">'+spendingMood+'</div></div>'
          + '</div>'

    function debtsView(){
      const toMeSYP=debtSummary('TO_ME','SYP'), toMeUSD=debtSummary('TO_ME','USD'), onMeSYP=debtSummary('ON_ME','SYP'), onMeUSD=debtSummary('ON_ME','USD');
      const query=(debtSearch||'').trim().toLowerCase();

      const hasActiveToMe = debts.some(d=>d.kind==='TO_ME' && !d.paid);
      const hasActiveOnMe = debts.some(d=>d.kind==='ON_ME' && !d.paid);

      const people = uniquePeople()
        .filter(name=>{
          const hay=name.toLowerCase();
          const matchesQuery = !query || hay.includes(query) || debts.some(d=>d.personName===name && ((d.reason||'')+' '+(d.customReason||'')).toLowerCase().includes(query));
          const matchesKind = debtKindFilter==='ALL' || debts.some(d=>d.personName===name && d.kind===debtKindFilter && !d.paid);
          return matchesQuery && matchesKind;
        })
        .sort((a,b)=>{
          const debtsA = debts.filter(d=>d.personName===a);
          const debtsB = debts.filter(d=>d.personName===b);
          const aActive = debtsA.some(d=>!d.paid);
          const bActive = debtsB.some(d=>!d.paid);
          const aHasAny = debtsA.length > 0;
          const bHasAny = debtsB.length > 0;
          const aScore = aActive ? 3 : (aHasAny ? 2 : 1);
          const bScore = bActive ? 3 : (bHasAny ? 2 : 1);
          if (aScore !== bScore) return bScore - aScore;
          if (aScore === 3) {
            const aNewestActive = Math.max(...debtsA.filter(d=>!d.paid).map(d=>new Date(d.date).getTime()));
            const bNewestActive = Math.max(...debtsB.filter(d=>!d.paid).map(d=>new Date(d.date).getTime()));
            if (aNewestActive !== bNewestActive) return bNewestActive - aNewestActive;
          }
          if (aScore === 2) {
            const aNewestAny = Math.max(...debtsA.map(d=>new Date(d.paidAt || d.date).getTime()));
            const bNewestAny = Math.max(...debtsB.map(d=>new Date(d.paidAt || d.date).getTime()));
            if (aNewestAny !== bNewestAny) return bNewestAny - aNewestAny;
          }
          return a.localeCompare(b,'ar');
        });

      const suggestions = personSuggestions();

        + '</div></div>'
        + '<div class="search-wrap"><div class="search-box"><input id="debtSearchInput" class="input search-input" placeholder="ابحث باسم الشخص..." value="'+(debtSearch||'').replace(/"/g,'&quot;')+'" oninput="setDebtSearch(this.value, this.selectionStart)" /><span class="search-icon">🔎</span>'+(suggestions.length?'<div class="search-suggestions">'+suggestions.map(name=>'<button type="button" class="search-suggestion-item" onclick="selectDebtSuggestion(\''+escapeJs(name)+'\')">'+name+'</button>').join('')+'</div>':'')+'</div></div>'
        + '<div class="row" style="margin-top:12px;">'
        + '<button type="button" class="chip '+(debtKindFilter==='ALL'?'active':'')+'" onclick="setDebtKindFilter(\'ALL\')">الكل</button>'
        + '<button type="button" class="chip '+(debtKindFilter==='TO_ME'?'active':'')+'" onclick="setDebtKindFilter(\'TO_ME\')"><span class="tab-with-dot">لي'+(hasActiveToMe?' <span class="online-dot"></span>':'')+'</span></button>'
        + '<button type="button" class="chip '+(debtKindFilter==='ON_ME'?'active':'')+'" onclick="setDebtKindFilter(\'ON_ME\')"><span class="tab-with-dot">لهم'+(hasActiveOnMe?' <span class="online-dot"></span>':'')+'</span></button>'
        + '</div>'
        + '<div class="section-head"><div class="section-title">الأشخاص</div><div class="section-sub">'+people.length+' شخص</div></div>'
        + '<div class="list">'+(people.length?people.map(function(name){
            const active = debts.some(function(d){ return d.personName===name && !d.paid; });
            const statusText = active ? 'يوجد تعاملات نشطة' : 'لا يوجد تعاملات';
            const statusColor = active ? 'var(--green)' : 'var(--text)';
            return '<div class="card tx-card" onclick="openPerson(\''+escapeJs(name)+'\')" style="cursor:pointer"><div class="tx-top"><div><div class="tx-title">👤 <span>'+name+'</span></div><div class="tx-date" style="color:'+statusColor+';font-weight:700">'+statusText+'</div></div><div></div></div><div class="tx-actions"><button class="ghost-danger" onclick="event.stopPropagation();requestDeletePerson(\''+escapeJs(name)+'\')">حذف</button></div></div>';

        + '<div class="field"><div class="label">العملة</div><div class="row"><button type="button" class="chip '+((editing?editing.currency:'SYP')==='SYP'?'active':'')+'" data-currency="SYP"><span class="syria-flag"><span class="stars">★ ★ ★</span></span> ليرة سورية</button><button type="button" class="chip '+((editing?editing.currency:'SYP')==='USD'?'active':'')+'" data-currency="USD">💲 دولار</button></div></div>'
        + '<div class="field"><div class="label">سبب الدين</div><div class="row" id="debtReasonsWrap"></div></div>'
        + '<div class="field" id="customReasonWrap2" style="display:none;"><div class="label">سبب مخصص</div><input class="input" id="customReason2" placeholder="اكتب السبب" value="'+(editing?(editing.customReason||''):'')+'" /></div>'
        + '<div class="field"><div class="label">التاريخ</div><input class="input" id="debtDate" type="date" value="'+dateValue+'" /></div>'
        + '<button type="submit" class="primary">'+(editing?'حفظ التعديل':'حفظ المعاملة')+'</button>'
        + '</form></div>'+monthModal()+deleteConfirmModal()+deletePersonConfirmModal()+settleConfirmModal()+'</div>';
    }

function bindAddForm(){
      const form=document.getElementById('txForm');
      if(!form) return;
      const editing = editingId!=null ? transactions.find(t=>t.id===editingId) : null;
      let type=editing ? editing.type : 'EXPENSE';
      let currency=editing ? editing.currency : 'SYP';
      let category=editing ? editing.category : 'قهوة';
      const categoriesWrap=document.getElementById('categories');
      const customWrap=document.getElementById('customCategoryWrap');
      const customInput=document.getElementById('customCategory');

      function renderCategories(){
        const list=type==='EXPENSE' ? expenseCategories : incomeCategories;
        if(!list.includes(category)) category=list[0];
        categoriesWrap.innerHTML=list.map(c=>'<button type="button" class="chip small active-cat '+(c===category?'active':'')+'" data-value="'+c+'">'+iconBadge(c)+' <span>'+c+'</span></button>').join('');
        customWrap.style.display = category==='أخرى' ? 'block' : 'none';
        categoriesWrap.querySelectorAll('.active-cat').forEach(btn=>{
          btn.addEventListener('click', ()=>{ category=btn.dataset.value; renderCategories(); });
        });
      }

      form.querySelectorAll('[data-type]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          type=btn.dataset.type;
          form.querySelectorAll('[data-type]').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          const list=type==='EXPENSE' ? expenseCategories : incomeCategories;
          if(!list.includes(category)) category=list[0];
          renderCategories();
        });
      });
      form.querySelectorAll('[data-currency]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          currency=btn.dataset.currency;
          form.querySelectorAll('[data-currency]').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
        });
      });

      renderCategories();

      form.addEventListener('submit', (e)=>{
        e.preventDefault();
        const amount=Number((document.getElementById('amount').value || '').replace(/[^0-9.]/g,''));
        const note=(document.getElementById('note').value || '').trim();
        const customName=(customInput.value || '').trim();
        if(!amount || amount<=0) return;
        saveTransaction({type,currency,amount,category,note,customName: category==='أخرى' ? customName : ''});
      });
    }

    function bindDebtForm(){
      const form=document.getElementById('debtForm');
      if(!form) return;
      const editing = editingDebtId!=null ? debts.find(d=>d.id===editingDebtId) : null;
      let kind=editing ? editing.kind : 'TO_ME';
      let currency=editing ? editing.currency : 'SYP';
      let reason=editing ? editing.reason : 'قرض';
      const reasonsWrap=document.getElementById('debtReasonsWrap');
      const customWrap=document.getElementById('customReasonWrap2');
      const customInput=document.getElementById('customReason2');

      function renderReasons(){
        if(!debtReasons.includes(reason)) reason='قرض';
        reasonsWrap.innerHTML=debtReasons.map(c=>'<button type="button" class="chip small active-reason '+(c===reason?'active':'')+'" data-value="'+c+'">'+iconBadge(c)+' <span>'+c+'</span></button>').join('');
        customWrap.style.display = reason==='أخرى' ? 'block' : 'none';
        reasonsWrap.querySelectorAll('.active-reason').forEach(btn=>{
          btn.addEventListener('click', ()=>{ reason=btn.dataset.value; renderReasons(); });
        });
      }

      form.querySelectorAll('[data-kind]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          kind=btn.dataset.kind;
          form.querySelectorAll('[data-kind]').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
      form.querySelectorAll('[data-currency]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          currency=btn.dataset.currency;
          form.querySelectorAll('[data-currency]').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
        });
      });

      renderReasons();

      form.addEventListener('submit', (e)=>{
        e.preventDefault();
        const personName=(document.getElementById('personName').value || '').trim();
        const amount=Number((document.getElementById('debtAmount').value || '').replace(/[^0-9.]/g,''));
        const dateValue=(document.getElementById('debtDate').value || selectedDate.toISOString().slice(0,10));
        const customReason=(customInput.value || '').trim();
        if(!personName){ showToast('اكتب اسم الشخص'); return; }
        if(!amount || amount<=0){ showToast('أدخل مبلغًا صحيحًا'); return; }
        saveDebt({personName, amount, currency, kind, reason, date:new Date(dateValue).toISOString(), customReason: reason==='أخرى' ? customReason : '', paid: editing ? editing.paid : false, paidAt: editing ? editing.paidAt || null : null});
      });
    }

    function setupDaysStrip(){
      const strip=document.querySelector('.days');
      const active=document.querySelector('.day.active');
      if(!strip || !active) return;
      const monthKey=selectedDate.getFullYear()+'-'+selectedDate.getMonth();
      if(lastRenderedMonthKey!==monthKey){
        lastRenderedMonthKey=monthKey;
        const targetLeft=active.offsetLeft - (strip.clientWidth/2) + (active.clientWidth/2);
        strip.scrollLeft=targetLeft;
        dayStripScrollLeft=strip.scrollLeft;
      }else{
        strip.scrollLeft=dayStripScrollLeft;
      }
      strip.addEventListener('scroll', ()=>{ dayStripScrollLeft=strip.scrollLeft; }, {passive:true});
    }
    function applyTheme(){ document.body.classList.toggle('dark', !!settings.darkMode); }

    
    function getSwipeNavScreen(s){
      if(s==='person' || s==='addDebt' || s==='addPerson') return 'debts';
      if(s==='history') return 'settings';
      if(s==='notifications') return previousScreen || 'home';
      return s;
    }
    function swipeTargets(){
      return ['home','debts','reports','settings'];
    }
    function bindSwipeNavigation(){
      const screenEl = document.querySelector('.screen');
      if(!screenEl) return;
      let active = false;
      let allowSwipe = false;

      screenEl.addEventListener('touchstart', (e)=>{
        if(!e.touches || !e.touches.length) return;
        const target = e.target;
        if(target.closest('.days') || target.closest('.day') || target.closest('input') || target.closest('textarea') || target.closest('select') || target.closest('button') || target.closest('.search-wrap') || target.closest('.modal')){
          active = false;
          allowSwipe = false;
          return;
        }
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchStartScreen = getSwipeNavScreen(screen);
        active = true;
        allowSwipe = true;
      }, {passive:true});

      screenEl.addEventListener('touchmove', (e)=>{
        if(!active || !allowSwipe || !e.touches || !e.touches.length) return;
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;

        if(Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 14){
          allowSwipe = false;
          screenEl.classList.remove('swiping');
          screenEl.style.transform = '';
          return;
        }
        if(Math.abs(dx) < 6) return;

        const limited = Math.max(-48, Math.min(48, dx * 0.42));
        screenEl.classList.add('swiping');
        screenEl.style.transform = 'translateX(' + limited + 'px)';
      }, {passive:true});

      screenEl.addEventListener('touchend', (e)=>{
        if(!active || !allowSwipe || !e.changedTouches || !e.changedTouches.length){
          active = false;
          allowSwipe = false;
          screenEl.classList.remove('swiping');
          screenEl.style.transform = '';
          return;
        }

        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;

        active = false;
        allowSwipe = false;
        screenEl.classList.remove('swiping');
        screenEl.style.transform = '';

        if(Math.abs(dx) < 26) return;
        if(Math.abs(dx) <= Math.abs(dy) * 1.15) return;

        const navs = swipeTargets();
        const current = getSwipeNavScreen(touchStartScreen);
        const idx = navs.indexOf(current);
        if(idx===-1) return;

        let target = '';
        if(dx < 0){
          target = navs[(idx - 1 + navs.length) % navs.length];
        }else if(dx > 0){
          target = navs[(idx + 1) % navs.length];
        }

        if(target && target!==current){
          setScreen(target);
        }
      }, {passive:true});

      screenEl.addEventListener('touchcancel', ()=>{
        active = false;
        allowSwipe = false;
        screenEl.classList.remove('swiping');
        screenEl.style.transform = '';
      }, {passive:true});
    }

    function render(){
      applyTheme();
      if(showIntro){ app.innerHTML=introView(); return; }
      if(screen==='add'){ app.innerHTML=addView(); bindAddForm(); return; }
      if(screen==='addDebt'){ app.innerHTML=addDebtView(); bindDebtForm(); return; }
      if(screen==='addPerson'){ app.innerHTML=addPersonView(); return; }
      if(screen==='reports'){
        app.innerHTML=reportsView();
        if(navTransitionClass){
          const el=app.querySelector('.screen'); if(el) el.classList.add(navTransitionClass);
          navTransitionClass='';
        }
        bindSwipeNavigation();
        return;
      }
      if(screen==='notifications'){ app.innerHTML=notificationsView(); return; }
      if(screen==='debts'){
        app.innerHTML=debtsView();
        if(navTransitionClass){
          const el=app.querySelector('.screen'); if(el) el.classList.add(navTransitionClass);
          navTransitionClass='';
        }
        bindSwipeNavigation();
        if(shouldRefocusDebtSearch){
          const input=document.getElementById('debtSearchInput');
          if(input){ input.focus(); try{ input.setSelectionRange(debtCursorPos, debtCursorPos); }catch(e){} }
          shouldRefocusDebtSearch=false;
        }
        return;
      }
      if(screen==='person'){ app.innerHTML=personView(); return; }
      if(screen==='history'){
        app.innerHTML=historyView();
        if(shouldRefocusSearch){
          const input=document.getElementById('historySearchInput');
          if(input){
            input.focus();
            try{ input.setSelectionRange(historyCursorPos, historyCursorPos); }catch(e){}
          }
          shouldRefocusSearch=false;
        }
        return;
      }
      if(screen==='settings'){
        app.innerHTML=settingsView();
        if(navTransitionClass){
          const el=app.querySelector('.screen'); if(el) el.classList.add(navTransitionClass);
          navTransitionClass='';
        }
        bindSwipeNavigation();
        return;
      }
      app.innerHTML=homeView();
      if(navTransitionClass){
        const el=app.querySelector('.screen'); if(el) el.classList.add(navTransitionClass);
        navTransitionClass='';
      }
      bindSwipeNavigation();
      setupDaysStrip();
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function (err) {
          console.log('SW registration failed:', err);
        });
      });
    }

    try{
      if('Notification' in window){ settings.notifications.permission = Notification.permission; saveSettings(); }
    }catch(e){}
    scheduleActivityAnchor();
    document.addEventListener('visibilitychange', ()=>{
      if(document.visibilityState==='visible'){
        scheduleActivityAnchor();
        checkSmartReminders();
      }
    });
    setInterval(checkSmartReminders, 60000);
    checkSmartReminders();

    render();

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>مصروفاتي</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root{
      --primary:#2563eb; --primary-dark:#0f172a; --bg:#f8fafc; --card:#ffffff; --text:#0f172a; --muted:#64748b;
      --border:#e2e8f0; --green:#22c55e; --orange:#f97316; --danger:#ef4444; --shadow:0 14px 34px rgba(15,23,42,.07);
    }
    body.dark{--bg:#0f172a; --card:#111827; --text:#f8fafc; --muted:#94a3b8; --border:#334155; --shadow:0 14px 34px rgba(0,0,0,.28);}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f8fafc 0%, #eef2f7 100%);color:var(--text);min-height:100%;overflow-x:hidden}
    body.dark{background:linear-gradient(180deg,#0f172a 0%, #111827 100%)}
    button,input,textarea,select{font:inherit}
    .app{max-width:420px;min-height:100vh;margin:0 auto;position:relative;padding-bottom:104px}
    .screen{padding:6px 16px 96px;min-height:100vh}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-top:2px}
    .icon-btn{min-width:46px;height:46px;border-radius:18px;border:1px solid var(--border);background:var(--card);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 18px rgba(15,23,42,.06);padding:0 12px}
    .title-wrap{text-align:center;flex:1;padding-top:2px}
    .title{margin:0;font-size:30px;font-weight:800;line-height:1.1}
    .subtitle{display:none}
    .week-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px}
    .week-range{font-weight:800}
    .week-nav{display:flex;gap:8px}
    .days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin-top:10px;margin-bottom:12px;padding-bottom:0}
    .days::-webkit-scrollbar{display:none}
    .day{min-width:0;width:100%;border:1px solid rgba(148,163,184,.18);background:rgba(255,255,255,.88);color:var(--text);border-radius:18px;text-align:center;padding:10px 4px;font-weight:800;cursor:pointer;position:relative;transition:.18s ease;box-shadow:0 4px 10px rgba(15,23,42,.04)}
    .day .small{display:block;font-size:10px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .day.active{background:linear-gradient(135deg,#0f172a 0%, #1e293b 30%, #2563eb 72%, #60a5fa 100%);color:#fff;border-color:transparent;box-shadow:0 10px 22px rgba(37,99,235,.22);transform:translateY(-1px)}
    .day.active .small{color:rgba(255,255,255,.88)}
    .day.today{outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.12)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:26px;box-shadow:var(--shadow)}
    .balance-card{background:linear-gradient(135deg,#0f172a 0%, #1e293b 35%, #2563eb 75%, #60a5fa 100%);color:#fff;border:none}
    .balance-inner{display:grid;grid-template-columns:1fr 1px 1fr;gap:16px;padding:18px}
    .balance-sep{background:rgba(255,255,255,.3);border-radius:999px}
    .currency-label{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
    .currency-balance{font-size:26px;font-weight:900;margin-top:10px}
    .income{margin-top:6px;color:#ecfeff;font-size:13px;line-height:1.6}
    .expense{margin-top:4px;color:#ffe4e6;font-size:13px;line-height:1.6}
    .stats-block{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.2)}
    .stats-divider{height:1px;background:rgba(255,255,255,.22);border-radius:999px;margin:12px 0 10px}
    .section-head{display:flex;justify-content:space-between;align-items:center;margin-top:22px}
    .section-title{font-size:20px;font-weight:800}
    .section-sub{font-size:14px;color:var(--muted);font-weight:700}
    .list{display:grid;gap:12px;margin-top:12px}
    .tx-card{padding:16px}
    .tx-top,.debt-top{display:flex;justify-content:space-between;gap:12px}
    .tx-title,.debt-title{font-weight:800;display:flex;align-items:center;gap:8px}
    .tx-date,.debt-date,.small-muted{color:var(--muted);font-size:13px}
    .tx-amount,.debt-amount{font-weight:800;text-align:left}
    .income-c{color:var(--green)}
    .expense-c{color:var(--orange)}
    .tx-actions,.debt-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:12px;flex-wrap:wrap}
    .ghost-edit,.ghost-danger,.ghost-ok,.ghost-open{border:none;background:transparent;font-weight:700;cursor:pointer}
    .ghost-edit,.ghost-open{color:var(--primary)}
    .ghost-ok{color:var(--green)}
    .ghost-danger{color:var(--danger)}
    .fab{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);width:56px;height:56px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%, #1e293b 35%, #2563eb 75%, #60a5fa 100%);color:#fff;box-shadow:0 10px 22px rgba(37,99,235,.24);z-index:120}
    .fab span{font-size:30px;line-height:1}
    .bottom-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(420px,100%);display:flex;justify-content:space-around;align-items:center;padding:10px 12px calc(10px + env(safe-area-inset-bottom,0px));background:rgba(248,250,252,.94);backdrop-filter:blur(14px);border-top:1px solid rgba(226,232,240,.9);z-index:90}
    body.dark .bottom-nav{background:rgba(17,24,39,.94)}
    .nav-btn{border:none;background:transparent;color:var(--muted);font-weight:700;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
    .nav-btn.active{color:var(--primary)}
    .field{margin-top:18px}
    .label{font-weight:800;margin-bottom:8px}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .chip{border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:18px;padding:12px 16px;cursor:pointer}
    .chip.small{padding:11px 14px;font-size:13px;line-height:1.5}
    .chip.active{background:linear-gradient(135deg,#0f172a 0%, #1e293b 35%, #2563eb 75%, #60a5fa 100%);color:#fff;border-color:transparent}
    .input,.textarea,.select{width:100%;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:20px;padding:14px 16px;outline:none}
    .textarea{min-height:110px;resize:vertical}
    .primary,.secondary-btn{width:100%;border:none;border-radius:20px;padding:15px 18px;font-weight:800;cursor:pointer}
    .primary{background:linear-gradient(135deg,#0f172a 0%, #1e293b 35%, #2563eb 75%, #60a5fa 100%);color:#fff}
    .secondary-btn{background:#e2e8f0;color:#0f172a;margin-top:10px}
    body.dark .secondary-btn{background:#1e293b;color:#fff}
    .empty{padding:30px 18px;text-align:center}
    .empty strong{display:block;font-size:18px}
    .empty span{display:block;margin-top:8px;color:var(--muted);font-size:14px}
    .intro{min-height:100vh;background:linear-gradient(180deg,#2563eb,#1d4ed8);color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    body.dark .intro{background:linear-gradient(180deg,#111827,#0f172a)}
    .intro-box{width:100%;max-width:360px}
    .intro-icon{width:88px;height:88px;margin:0 auto;border-radius:28px;background:rgba(255,255,255,.14);display:grid;place-items:center;font-size:36px}
    .intro h1{margin:20px 0 0;font-size:40px}
    .intro p{margin-top:14px;color:#dbeafe;line-height:1.9}
    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.35);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
    .modal{width:100%;max-width:360px;background:var(--card);color:var(--text);border-radius:28px;padding:22px;box-shadow:var(--shadow)}
    .modal-title{font-size:24px;font-weight:800}
    .modal-text{color:var(--muted);font-size:15px;line-height:1.8;margin-top:6px}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
    .btn-cancel,.btn-confirm,.btn-soft{border-radius:18px;padding:14px 22px;font-weight:800;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text)}
    .btn-confirm{background:linear-gradient(180deg,#ef4444,#dc2626);color:#fff;border-color:#dc2626}
    .btn-soft{background:linear-gradient(180deg,#3b82f6,#2563eb);color:#fff;border-color:#2563eb}
    .cat-icon{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:999px;font-size:12px;color:#fff}
    .search-wrap{margin-top:14px;position:relative}
    .search-box{position:relative}
    .search-input{padding-right:40px}
    .search-icon{position:absolute;top:50%;right:14px;transform:translateY(-50%);color:var(--muted)}
    .search-suggestions{position:absolute;top:calc(100% + 6px);right:0;left:0;background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;z-index:40}
    .search-suggestion-item{display:block;width:100%;text-align:right;border:none;background:transparent;color:var(--text);padding:12px 14px;cursor:pointer}
    .search-suggestion-item + .search-suggestion-item{border-top:1px solid var(--border)}
    .switch{position:relative;display:inline-block;width:50px;height:28px}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;inset:0;background:#94a3b8;transition:.2s;border-radius:999px}
    .slider:before{position:absolute;content:"";height:22px;width:22px;right:3px;top:3px;background:white;transition:.2s;border-radius:50%}
    .switch input:checked + .slider{background:#2563eb}
    .switch input:checked + .slider:before{transform:translateX(-22px)}
    .person-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(37,99,235,.10);color:#2563eb;border:1px solid rgba(37,99,235,.18);font-size:13px;font-weight:700}
    .debt-kind-badge{display:inline-flex;align-items:center;justify-content:center;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:800}
    .debt-kind-badge.to-me{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.22)}
    .debt-kind-badge.on-me{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.22)}
    .notif-badge{position:absolute;top:-4px;left:-4px;min-width:18px;height:18px;border-radius:999px;background:var(--danger);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px}
    .icon-btn.has-badge{position:relative}
    .top-actions{display:flex;align-items:center;gap:8px}
    .menu-list{display:grid;gap:10px;margin-top:18px}
    .menu-list .btn-soft,.menu-list .btn-cancel{width:100%;text-align:center}
    .week-chip{display:flex;flex-direction:column;align-items:flex-start;gap:2px;min-width:148px;padding:12px 14px;border-radius:18px}
    .week-chip-title{font-weight:900;font-size:13px}
    .week-chip-sub{font-size:11px;opacity:.9}
    .chip.has-dot{
      position:relative;
      padding-inline-start:28px;
    }
    .chip-dot{
      position:absolute;
      inset-inline-start:12px;
      top:50%;
      transform:translateY(-50%);
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--green);
      box-shadow:0 0 0 4px rgba(34,197,94,.14);
    }
    .chip.active .chip-dot{
      background:#86efac;
      box-shadow:0 0 0 4px rgba(255,255,255,.12);
    }

    .settings-shortcut{
      position:relative;
      overflow:hidden;
      padding:18px;
      border-radius:24px;
      background:linear-gradient(135deg,#0f172a 0%, #1e293b 40%, #2563eb 100%);
      color:#fff;
      border:none;
      box-shadow:0 16px 34px rgba(37,99,235,.18);
    }
    .settings-shortcut::before{
      content:"";
      position:absolute;
      inset:auto -30px -30px auto;
      width:120px;
      height:120px;
      border-radius:50%;
      background:rgba(255,255,255,.08);
      pointer-events:none;
    }
    .settings-shortcut-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .settings-shortcut-icon{
      width:48px;
      height:48px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.14);
      font-size:22px;
      flex:0 0 auto;
    }
    .settings-shortcut-title{
      font-size:18px;
      font-weight:900;
      margin:0;
      color:#fff;
    }
    .settings-shortcut-text{
      margin-top:6px;
      color:rgba(255,255,255,.86);
      font-size:13px;
      line-height:1.8;
    }
    .settings-shortcut-btn{
      margin-top:14px;
      width:100%;
      border:none;
      border-radius:18px;
      padding:14px 16px;
      font-weight:900;
      cursor:pointer;
      background:rgba(255,255,255,.14);
      color:#fff;
      backdrop-filter:blur(8px);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
    }
    .settings-shortcut-btn:active{
      transform:translateY(1px);
    }



    .notif-list{display:grid;gap:10px;margin-top:14px}
    .notif-item{padding:14px;border-radius:18px;background:rgba(148,163,184,.08);border:1px solid var(--border)}
    .notif-item-top{display:flex;justify-content:space-between;gap:10px}
    .notif-item-title{font-weight:800;font-size:14px}
    .notif-item-time{font-size:12px;color:var(--muted)}
    .notif-item-body{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.7}
    .insights-hero{margin-top:16px;padding:18px;border-radius:28px;color:#fff;background:linear-gradient(135deg,#0f172a 0%, #1e293b 45%, #2563eb 100%)}
    .insights-title{font-size:26px;font-weight:900}
    .insights-sub{font-size:14px;line-height:1.8;opacity:.95;margin-top:8px}
    .insight-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
    .insight-tab{border:none;border-radius:18px;padding:13px 10px;background:#fff;color:#0f172a;font-weight:800}
    .insight-tab.active{background:linear-gradient(135deg,#0f172a 0%, #1e293b 35%, #2563eb 75%, #60a5fa 100%);color:#fff}
    .insight-panel{margin-top:16px;padding:16px;border-radius:24px;background:linear-gradient(180deg,#ffffff,#f8fbff);border:1px solid #dbeafe}
    body.dark .insight-panel{background:linear-gradient(180deg,#111827,#0f172a);border-color:#334155}
    .insight-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .insight-head-title{font-size:18px;font-weight:900}
    .insight-head-sub{font-size:13px;color:var(--muted);line-height:1.7;margin-top:4px}
    .smart-badge{padding:8px 12px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-weight:800;font-size:12px}
    .insight-kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .insight-kpi{padding:14px;border-radius:20px;border:1px solid var(--border);background:var(--card)}
    .insight-kpi-label{font-size:12px;color:var(--muted)}
    .insight-kpi-value{font-size:20px;font-weight:900;margin-top:6px}
    .insight-list{display:grid;gap:10px;margin-top:14px}
    .insight-item{padding:14px 16px;border-radius:18px;background:var(--card);border:1px solid var(--border)}
    .insight-item-title{font-size:14px;font-weight:900}
    .insight-item-text{font-size:13px;color:var(--muted);line-height:1.8;margin-top:6px}
    .insight-note{margin-top:14px;padding:14px 16px;border-radius:18px;background:#eff6ff;color:#1e3a8a;border:1px solid #bfdbfe;font-size:13px;line-height:1.8;font-weight:700}
    body.dark .insight-note{background:#172554;color:#dbeafe;border-color:#1d4ed8}
    .success-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:220;opacity:0;transition:opacity .18s ease}
    .success-overlay.show{opacity:1}
    .success-mark-wrap{width:92px;height:92px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:rgba(34,197,94,.10);border:3px solid rgba(34,197,94,.28)}
    .success-mark{width:58px;height:58px;border-radius:999px;background:linear-gradient(180deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;font-weight:800}
    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;background:#0f172a;color:#fff;padding:10px 16px;border-radius:999px;z-index:240;opacity:0;pointer-events:none;transition:.2s}
    .toast.show{opacity:1}
    .syria-flag{display:inline-flex;width:26px;height:26px;border-radius:999px;overflow:hidden;position:relative;background:linear-gradient(to bottom,#16a34a 0 33%, #ffffff 33% 66%, #111827 66% 100%);border:none;align-items:center;justify-content:center}
    .syria-flag .stars{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:1px;color:#e11d48;font-size:7px;line-height:1;font-weight:700}
    body.dark .day{background:rgba(17,24,39,.92);border-color:rgba(148,163,184,.16);box-shadow:none}
    body.dark .day.today{box-shadow:0 0 0 2px rgba(96,165,250,.18)}

  </style>
</head>
<body>
  <div id="app"></div>
  <div id="successOverlay" class="success-overlay"><div class="success-mark-wrap"><div class="success-mark">✓</div></div></div>
  <div id="toast" class="toast"></div>
  <script>
    const STORAGE_KEY='masrofi_direct_transactions_v9';
    const INTRO_KEY='masrofi_direct_intro_v9';
    const SETTINGS_KEY='masroofati_settings_v31';
    const DEBTS_KEY='masroofati_debts_v31';
    const PEOPLE_KEY='masroofati_people_v39';
    const NOTIFICATION_CENTER_KEY='masroofati_notification_center_v78';
    const expenseCategories=['أكل','قهوة','مواصلات','فواتير','تسوق','صحة','بيت','رصيد','أخرى'];
    const incomeCategories=['راتب','عمل إضافي','بيع','هدية','رصيد','أخرى'];
    const debtReasons=['قرض','مشتريات','إيجار','مساعدة','قسط','أخرى'];
    const weekDayNames=['الجمعة','السبت','الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس'];
    const sampleTransactions=[];
    const categoryMeta = {
      'أكل': { icon:'🍽️', color:'#f59e0b' }, 'قهوة': { icon:'☕', color:'#92400e' }, 'مواصلات': { icon:'🚌', color:'#2563eb' },
      'فواتير': { icon:'🧾', color:'#7c3aed' }, 'تسوق': { icon:'🛍️', color:'#db2777' }, 'صحة': { icon:'💊', color:'#16a34a' },
      'بيت': { icon:'🏠', color:'#0f766e' }, 'رصيد': { icon:'💰', color:'#059669' }, 'راتب': { icon:'💵', color:'#16a34a' },
      'عمل إضافي': { icon:'🧰', color:'#2563eb' }, 'بيع': { icon:'🏷️', color:'#ea580c' }, 'هدية': { icon:'🎁', color:'#db2777' },
      'أخرى': { icon:'✏️', color:'#475569' }, 'قرض': { icon:'🤝', color:'#2563eb' }, 'مشتريات': { icon:'🛒', color:'#ea580c' },
      'إيجار': { icon:'🏘️', color:'#0f766e' }, 'مساعدة': { icon:'🫶', color:'#db2777' }, 'قسط': { icon:'📅', color:'#7c3aed' }
    };

    const app=document.getElementById('app');
    let screen='home', previousScreen='home', showIntro=!localStorage.getItem(INTRO_KEY);
    let transactions=loadTransactions(), debts=loadDebts(), peoplePages=loadPeople();
    let selectedDate=normalizeDate(new Date());
    let settings=loadSettings(); ensureNotificationSettings();
    let notificationCenter=loadNotificationCenter();
    let pendingDelete={type:null,id:null}, pendingDeletePersonName='', pendingSettleDebtId=null;
    let debtFormPersonName='', debtReturnScreen='debts', txReturnScreen='home', editingId=null, editingDebtId=null;
    let personViewName='', personDebtTab='TO_ME', historySearch='', debtSearch='', debtKindFilter='ALL', smartTab='spending', showWeekMenu=false, selectedHistoryWeek='';
    let dayStripScrollLeft=0, ensureSelectedDayVisible=false;

    function loadJson(key,fallback){ try{ const s=localStorage.getItem(key); return s ? JSON.parse(s) : fallback; }catch{return fallback;} }
    function saveJson(key,val){ localStorage.setItem(key, JSON.stringify(val)); }
    function loadTransactions(){ return loadJson(STORAGE_KEY, sampleTransactions.slice()); }
    function saveTransactions(){ saveJson(STORAGE_KEY, transactions); }
    function loadDebts(){ return loadJson(DEBTS_KEY, []); }
    function saveDebts(){ saveJson(DEBTS_KEY, debts); }
    function loadPeople(){ return loadJson(PEOPLE_KEY, []); }
    function savePeople(){ saveJson(PEOPLE_KEY, peoplePages); }
    function loadNotificationCenter(){ return loadJson(NOTIFICATION_CENTER_KEY, []); }
    function saveNotificationCenter(){ saveJson(NOTIFICATION_CENTER_KEY, notificationCenter); }
    function loadSettings(){
      return loadJson(SETTINGS_KEY, {darkMode:false, showDotOnToday:true, notifications:{afternoon:true, evening:true, activity:true, spendAlert:true, permission:'default', lastAfternoonDate:'', lastEveningDate:'', lastActivityDate:'', lastSpendAlertDate:''}});
    }
    function saveSettings(){ saveJson(SETTINGS_KEY, settings); }

    function ensureNotificationSettings(){
      settings.notifications = settings.notifications || {};

    function playSuccessSound(){
      try{
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if(!AudioCtx) return;

        if(!window.__masroofatiAudioCtx){
          window.__masroofatiAudioCtx = new AudioCtx();
        }

        const ctx = window.__masroofatiAudioCtx;
        if(ctx.state === 'suspended') ctx.resume();

        const now = ctx.currentTime;

        const master = ctx.createGain();
        master.connect(ctx.destination);
        master.gain.setValueAtTime(0.001, now);
        master.gain.exponentialRampToValueAtTime(0.42, now + 0.025);
        master.gain.exponentialRampToValueAtTime(0.001, now + 1.05);

        function note(freq,start,duration,type='sine',vol=0.15){
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.type = type;
          osc.frequency.setValueAtTime(freq, now + start);

          gain.gain.setValueAtTime(0.001, now + start);
          gain.gain.exponentialRampToValueAtTime(vol, now + start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + start + duration);

          osc.connect(gain);
          gain.connect(master);

          osc.start(now + start);
          osc.stop(now + start + duration);
        }

        // Premium banking-style layered confirmation chime
        note(587, 0.00, 0.22, 'sine', 0.18);
        note(784, 0.08, 0.28, 'triangle', 0.16);
        note(987, 0.18, 0.34, 'triangle', 0.15);
        note(1174,0.28, 0.50, 'sine', 0.12);

        // sparkle layer
        note(1567,0.22,0.24,'sine',0.06);
        note(1760,0.34,0.28,'sine',0.05);

      }catch(e){}
    }

      const d=normalizeDate(date);
      const jsDay=d.getDay(); // 0 Sun ... 5 Fri
      const diff=(jsDay+2)%7; // Fri=>0, Sat=>1,...
      d.setDate(d.getDate()-diff);
      return d;
    }
    function endOfFinancialWeek(date){ const s=startOfFinancialWeek(date); const e=new Date(s); e.setDate(s.getDate()+6); e.setHours(23,59,59,999); return e; }

      const d=normalizeDate(date), s=startOfFinancialWeek(refDate), e=normalizeDate(endOfFinancialWeek(refDate));
      return d>=s && d<=e;

    function calcPeriod(currency, refDate=selectedDate){
      const list=transactions.filter(t=>t.currency===currency);
      const weekList=list.filter(t=>inWeek(t.createdAt, refDate));
      const income=weekList.filter(t=>t.type==='INCOME').reduce((s,t)=>s+t.amount,0);
      const expense=weekList.filter(t=>t.type==='EXPENSE').reduce((s,t)=>s+t.amount,0);
      const dayIncome=list.filter(t=>t.type==='INCOME' && sameDay(t.createdAt,refDate)).reduce((s,t)=>s+t.amount,0);
      const dayExpense=list.filter(t=>t.type==='EXPENSE' && sameDay(t.createdAt,refDate)).reduce((s,t)=>s+t.amount,0);
      return {balance:income-expense, weekIncome:income, weekExpense:expense, dayIncome, dayExpense};
    }
    function recentDailyExpenseAverage(days){
      const today=normalizeDate(new Date()); let total=0;
      for(let i=0;i<days;i++){ const d=new Date(today); d.setDate(today.getDate()-i); total += transactions.filter(t=>t.type==='EXPENSE' && sameDay(t.createdAt,d)).reduce((s,t)=>s+t.amount,0); }
      return total/Math.max(days,1);
    }

      return `<div class="app"><div class="screen">
        ${topBar('الديون','',false)}
        <div class="card balance-card"><div class="balance-inner">
          <div><div class="currency-label"><span class="syria-flag"><span class="stars">★ ★ ★</span></span><span>الليرة السورية</span></div><div class="currency-balance">${fmt(toMeSYP-onMeSYP,'SYP')}</div><div class="income">لي: ${fmt(toMeSYP,'SYP')}</div><div class="expense">لهم: ${fmt(onMeSYP,'SYP')}</div></div>
          <div class="balance-sep"></div>
          <div><div class="currency-label">الدولار</div><div class="currency-balance">${fmt(toMeUSD-onMeUSD,'USD')}</div><div class="income">لي: ${fmt(toMeUSD,'USD')}</div><div class="expense">لهم: ${fmt(onMeUSD,'USD')}</div></div>
        </div></div>
        <div class="search-wrap"><div class="search-box"><input id="debtSearchInput" class="input search-input" placeholder="ابحث باسم الشخص..." value="${(debtSearch||'').replace(/"/g,'&quot;')}" oninput="liveFilterDebts(this.value)" onfocus="liveFilterDebts(this.value)" /><span class="search-icon">🔎</span><div id="debtSuggestions" class="search-suggestions" style="display:none"></div></div></div>
        <div class="row" style="margin-top:12px;">
          <button type="button" class="chip ${debtKindFilter==='ALL'?'active':''}" onclick="debtKindFilter='ALL'; render()">الكل</button>
          <button type="button" class="chip ${hasToMeActive?'has-dot':''} ${debtKindFilter==='TO_ME'?'active':''}" onclick="debtKindFilter='TO_ME'; render()">${hasToMeActive?'<span class="chip-dot"></span>':''}لي</button>
          <button type="button" class="chip ${hasOnMeActive?'has-dot':''} ${debtKindFilter==='ON_ME'?'active':''}" onclick="debtKindFilter='ON_ME'; render()">${hasOnMeActive?'<span class="chip-dot"></span>':''}لهم</button>
        </div>
        <div class="section-head"><div class="section-title">الأشخاص</div><div id="debtsCount" class="section-sub">${people.length} شخص</div></div>
        <div id="debtsPeopleList" class="list">${people.length?people.map(name=>{const active=debts.some(d=>d.personName===name && !d.paid); const searchText=(name+' '+debts.filter(d=>d.personName===name).map(d=>((d.reason||'')+' '+(d.customReason||''))).join(' ')).toLowerCase().replace(/"/g,'&quot;'); const kind=(debts.some(d=>d.personName===name && d.kind==='TO_ME' && !d.paid)?'TO_ME ':'') + (debts.some(d=>d.personName===name && d.kind==='ON_ME' && !d.paid)?'ON_ME':''); return `<div class="card tx-card debt-person-card" data-search="${searchText}" data-person-name="${name.replace(/"/g,'&quot;')}" data-kind="${kind.trim()}" onclick="openPerson('${name.replace(/'/g,"\\'")}')" style="cursor:pointer"><div class="tx-top"><div><div class="tx-title">👤 <span>${name}</span></div><div class="tx-date" style="color:${active?'var(--green)':'var(--muted)'};font-weight:700">${active?'يوجد تعاملات نشطة':'لا يوجد تعاملات'}</div></div><div></div></div><div class="tx-actions"><button class="ghost-danger" onclick="event.stopPropagation(); requestDeletePerson('${name.replace(/'/g,"\\'")}')">حذف</button></div></div>`}).join(''):'<div class="card empty"><strong>لا يوجد أي ديون</strong><span>أضف شخصًا جديدًا</span></div>'}</div>
      </div><button class="fab" onclick="openAddPerson()"><span>+</span></button>${bottomNav()}${showWeekMenu ? weekMenuModal() : ''}${deleteConfirmModal()}${deletePersonConfirmModal()}${settleConfirmModal()}</div>`;
    }

    function personView(){
      const name=personViewName||'', allList=sortDebtsForView(debts.filter(d=>d.personName===name)), list=allList.filter(d=>d.kind===personDebtTab), s=personDebtSummary(name);
      const hasToMeActive=debts.some(d=>d.personName===name && d.kind==='TO_ME' && !d.paid);
      const hasOnMeActive=debts.some(d=>d.personName===name && d.kind==='ON_ME' && !d.paid);
      return `<div class="app"><div class="screen">
        ${topBar(name,'صفحة الشخص',true,true)}
        <div class="row" style="margin-top:12px;"><span class="person-pill">لي سوري: ${fmt(s.toMeSYP,'SYP')}</span><span class="person-pill">لي دولار: ${fmt(s.toMeUSD,'USD')}</span><span class="person-pill">لهم سوري: ${fmt(s.onMeSYP,'SYP')}</span><span class="person-pill">لهم دولار: ${fmt(s.onMeUSD,'USD')}</span></div>
        <div class="row" style="margin-top:12px;"><button class="chip ${hasToMeActive?'has-dot':''} ${personDebtTab==='TO_ME'?'active':''}" onclick="setPersonDebtTab('TO_ME')">${hasToMeActive?'<span class="chip-dot"></span>':''}لي</button><button class="chip ${hasOnMeActive?'has-dot':''} ${personDebtTab==='ON_ME'?'active':''}" onclick="setPersonDebtTab('ON_ME')">${hasOnMeActive?'<span class="chip-dot"></span>':''}لهم</button></div>
        <div class="section-head"><div class="section-title">السجلات</div><div class="section-sub">${list.length} سجل</div></div>
        <div class="list">${list.length?list.map(renderDebtCard).join(''):'<div class="card empty"><strong>لا توجد سجلات</strong><span>لا توجد ديون في هذا القسم</span></div>'}</div>
      </div><button class="fab" onclick="openAddDebtForPerson()"><span>+</span></button>${bottomNav()}${showWeekMenu ? weekMenuModal() : ''}${deleteConfirmModal()}${deletePersonConfirmModal()}${settleConfirmModal()}</div>`;
    }

    function addPersonView(){
      return `<div class="app"><div class="screen">
        ${topBar('إضافة شخص','',true,true)}
        <div class="card" style="padding:16px; margin-top:16px;">
          <div class="field"><div class="label">اسم الشخص</div><input id="newPersonName" class="input" placeholder="اكتب اسم الشخص" /></div>
          <button class="primary" onclick="savePersonPage()">حفظ الشخص</button>
        </div>
      </div></div>`;
    }

    function notificationsView(){
      const items=notificationCenter.slice(0,20), permissionGranted=settings.notifications.permission==='granted';
      return `<div class="app"><div class="screen">
        ${topBar('الإشعارات','🔔 آخر التنبيهات',true,true)}
        ${!permissionGranted?`<div class="card" style="padding:16px; margin-top:16px;"><div style="font-size:16px;font-weight:800">تفعيل إشعارات الموبايل</div><div class="small-muted" style="margin-top:6px">اضغط مرة واحدة فقط لتفعيل إشعارات التطبيق على جهازك.</div><button class="primary" style="margin-top:12px;" onclick="requestNotificationPermission()">تفعيل الإشعارات</button></div>`:''}
        <div class="section-head"><div class="section-title">آخر الإشعارات</div><div class="section-sub">${items.length} إشعار</div></div>
        <div class="notif-list">${items.length?items.map(item=>`<div class="notif-item"><div class="notif-item-top"><div class="notif-item-title">${item.title}</div><div class="notif-item-time">${new Date(item.createdAt).toLocaleString('en-GB')}</div></div><div class="notif-item-body">${item.body}</div></div>`).join(''):'<div class="card empty"><strong>لا توجد إشعارات</strong><span>ستظهر هنا آخر التذكيرات والتنبيهات</span></div>'}</div>
      </div></div>`;
    }

    function settingsView(){
      return `<div class="app"><div class="screen">
        ${topBar('الإعدادات','⚙️',false)}
        <div class="card" style="padding:18px; margin-top:16px;">
          <div class="section-title" style="font-size:18px;">المظهر</div>
          <div class="small-muted">اختر نمط العرض المناسب لك داخل التطبيق</div>
          <div style="display:grid;gap:10px;margin-top:14px;">
            <button class="secondary-btn" style="${!settings.darkMode?'outline:2px solid var(--primary);font-weight:900;':''}" onclick="updateSetting('darkMode', false)">
              ☀️ المظهر الفاتح
            </button>
            <button class="secondary-btn" style="${settings.darkMode?'outline:2px solid var(--primary);font-weight:900;':''}" onclick="updateSetting('darkMode', true)">
              🌙 المظهر الداكن
            </button>
          </div>
        </div>
        <div class="settings-shortcut" style="margin-top:14px;">
          <div class="settings-shortcut-head">
            <div>
              <div class="settings-shortcut-title">السجل الكامل</div>
              <div class="settings-shortcut-text">راجع الأسابيع السابقة واستعرض كل العمليات بتفاصيل مرتبة وواضحة.</div>
            </div>
            <div class="settings-shortcut-icon">🗂️</div>
          </div>
          <button class="settings-shortcut-btn" onclick="setScreen('history')">فتح السجل الكامل</button>
        </div>
      </div>${bottomNav()}</div>`;
    }

    function addDebtView(){
      const editing=editingDebtId!=null ? debts.find(d=>d.id===editingDebtId) : null;
      const lockedName=editing ? editing.personName : debtFormPersonName;
      const dateValue=editing ? normalizeDate(editing.date).toISOString().slice(0,10) : selectedDate.toISOString().slice(0,10);
      return `<div class="app"><div class="screen">
        ${topBar(editing?'تعديل الدين':'إضافة معاملة','',true,true)}
        <form id="debtForm">
          <div class="field"><div class="label">القسم</div><div class="row"><button type="button" class="chip ${(editing?editing.kind:'TO_ME')==='TO_ME'?'active':''}" data-kind="TO_ME">لي</button><button type="button" class="chip ${(editing?editing.kind:'TO_ME')==='ON_ME'?'active':''}" data-kind="ON_ME">لهم</button></div></div>
          <div class="field"><div class="label">اسم الشخص</div><input class="input" id="personName" placeholder="اسم الشخص" ${lockedName?'readonly':''} value="${lockedName||''}" /></div>
          <div class="field"><div class="label">المبلغ</div><input class="input" id="debtAmount" inputmode="decimal" placeholder="أدخل المبلغ" value="${editing?editing.amount:''}" /></div>
          <div class="field"><div class="label">العملة</div><div class="row"><button type="button" class="chip ${(editing?editing.currency:'SYP')==='SYP'?'active':''}" data-currency="SYP"><span class="syria-flag"><span class="stars">★ ★ ★</span></span> ليرة سورية</button><button type="button" class="chip ${(editing?editing.currency:'SYP')==='USD'?'active':''}" data-currency="USD">💲 دولار</button></div></div>
          <div class="field"><div class="label">سبب الدين</div><div class="row" id="debtReasonsWrap"></div></div>
          <div class="field" id="customReasonWrap2" style="display:none;"><div class="label">سبب مخصص</div><input class="input" id="customReason2" placeholder="اكتب السبب" value="${editing?(editing.customReason||''):''}" /></div>
          <div class="field"><div class="label">التاريخ</div><input class="input" id="debtDate" type="date" value="${dateValue}" /></div>
          <button type="submit" class="primary">${editing?'حفظ التعديل':'حفظ المعاملة'}</button>
        </form>
      </div></div>`;
    }

    function bindAddForm(){
      const form=document.getElementById('txForm'); if(!form) return;
      const editing=editingId!=null ? transactions.find(t=>t.id===editingId) : null;
      let type=editing?editing.type:'EXPENSE', currency=editing?editing.currency:'SYP', category=editing?editing.category:'قهوة';
      const categoriesWrap=document.getElementById('categories'), customWrap=document.getElementById('customCategoryWrap'), customInput=document.getElementById('customCategory');
      function renderCategories(){
        const list=type==='EXPENSE'?expenseCategories:incomeCategories;
        if(!list.includes(category)) category=list[0];
        categoriesWrap.innerHTML=list.map(c=>`<button type="button" class="chip small active-cat ${c===category?'active':''}" data-value="${c}">${iconBadge(c)} <span>${c}</span></button>`).join('');
        customWrap.style.display=category==='أخرى'?'block':'none';
        categoriesWrap.querySelectorAll('.active-cat').forEach(btn=>btn.addEventListener('click',()=>{ category=btn.dataset.value; renderCategories(); }));
      }
      form.querySelectorAll('[data-type]').forEach(btn=>btn.addEventListener('click',()=>{ type=btn.dataset.type; form.querySelectorAll('[data-type]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderCategories(); }));
      form.querySelectorAll('[data-currency]').forEach(btn=>btn.addEventListener('click',()=>{ currency=btn.dataset.currency; form.querySelectorAll('[data-currency]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }));
      renderCategories();
      form.addEventListener('submit',e=>{
        e.preventDefault();
        const amount=Number((document.getElementById('amount').value||'').replace(/[^0-9.]/g,'')); const note=(document.getElementById('note').value||'').trim(); const customName=(customInput.value||'').trim();
        if(!amount || amount<=0){ showToast('أدخل مبلغًا صحيحًا'); return; }
        saveTransaction({type,currency,amount,category,note,customName:category==='أخرى'?customName:''});
      });
    }
    function bindDebtForm(){
      const form=document.getElementById('debtForm'); if(!form) return;
      const editing=editingDebtId!=null ? debts.find(d=>d.id===editingDebtId) : null;
      let kind=editing?editing.kind:'TO_ME', currency=editing?editing.currency:'SYP', reason=editing?editing.reason:'قرض';
      const reasonsWrap=document.getElementById('debtReasonsWrap'), customWrap=document.getElementById('customReasonWrap2'), customInput=document.getElementById('customReason2');
      function renderReasons(){
        if(!debtReasons.includes(reason)) reason='قرض';
        reasonsWrap.innerHTML=debtReasons.map(c=>`<button type="button" class="chip small active-reason ${c===reason?'active':''}" data-value="${c}">${iconBadge(c)} <span>${c}</span></button>`).join('');
        customWrap.style.display=reason==='أخرى'?'block':'none';
        reasonsWrap.querySelectorAll('.active-reason').forEach(btn=>btn.addEventListener('click',()=>{ reason=btn.dataset.value; renderReasons(); }));
      }
      form.querySelectorAll('[data-kind]').forEach(btn=>btn.addEventListener('click',()=>{ kind=btn.dataset.kind; form.querySelectorAll('[data-kind]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }));
      form.querySelectorAll('[data-currency]').forEach(btn=>btn.addEventListener('click',()=>{ currency=btn.dataset.currency; form.querySelectorAll('[data-currency]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }));
      renderReasons();
      form.addEventListener('submit',e=>{
        e.preventDefault();
        const personName=(document.getElementById('personName').value||'').trim();
        const amount=Number((document.getElementById('debtAmount').value||'').replace(/[^0-9.]/g,'')); const dateValue=(document.getElementById('debtDate').value||selectedDate.toISOString().slice(0,10)); const customReason=(customInput.value||'').trim();
        if(!personName){ showToast('اكتب اسم الشخص'); return; }
        if(!amount || amount<=0){ showToast('أدخل مبلغًا صحيحًا'); return; }
        saveDebt({personName,amount,currency,kind,reason,date:new Date(dateValue).toISOString(),customReason:reason==='أخرى'?customReason:'',paid:editing?editing.paid:false,paidAt:editing?editing.paidAt||null:null});
      });
    }

    function applyTheme(){ document.body.classList.toggle('dark', !!settings.darkMode); }
    function render(){
      applyTheme();
      if(showIntro){ app.innerHTML=introView(); return; }
      if(screen==='add'){ app.innerHTML=addView(); bindAddForm(); return; }
      if(screen==='addDebt'){ app.innerHTML=addDebtView(); bindDebtForm(); return; }
      if(screen==='addPerson'){ app.innerHTML=addPersonView(); return; }
      if(screen==='reports'){ app.innerHTML=reportsView(); return; }
      if(screen==='history'){ app.innerHTML=historyView(); return; }
      if(screen==='notifications'){ app.innerHTML=notificationsView(); return; }
      if(screen==='debts'){ app.innerHTML=debtsView(); return; }
      if(screen==='person'){ app.innerHTML=personView(); return; }
      if(screen==='settings'){ app.innerHTML=settingsView(); return; }
      app.innerHTML=homeView();
      bindAndRestoreDayStrip();
      if(ensureSelectedDayVisible){
        ensureSelectedDayVisibleNow();
        ensureSelectedDayVisible=false;
      }
    }

    window.setScreen=setScreen; window.goBack=goBack; window.startApp=startApp; window.openNotifications=openNotifications;
    window.requestDelete=requestDelete; window.cancelDelete=cancelDelete; window.confirmDelete=confirmDelete;
    window.requestDeletePerson=requestDeletePerson; window.cancelDeletePerson=cancelDeletePerson; window.confirmDeletePerson=confirmDeletePerson;
    window.requestSettleDebt=requestSettleDebt; window.cancelSettleDebt=cancelSettleDebt; window.confirmSettleDebt=confirmSettleDebt;
    window.updateSetting=updateSetting; window.setSmartTab=setSmartTab; window.openAddTransaction=openAddTransaction; window.openAddDebt=openAddDebt;
    window.openAddPerson=openAddPerson; window.savePersonPage=savePersonPage; window.openAddDebtForPerson=openAddDebtForPerson; window.openPerson=openPerson;
    window.setPersonDebtTab=setPersonDebtTab; window.startEdit=startEdit; window.startEditDebt=startEditDebt;
    window.setSelectedDate=setSelectedDate; window.goCurrentWeek=goCurrentWeek; window.moveWeek=moveWeek; window.selectDebtSuggestion=selectDebtSuggestion;
    window.requestNotificationPermission=requestNotificationPermission; window.historySearch=historySearch; window.debtSearch=debtSearch; window.debtKindFilter=debtKindFilter; window.setHistoryWeek=setHistoryWeek;

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function (err) { console.log('SW registration failed:', err); });
      });
    }

    try{ if('Notification' in window){ settings.notifications.permission=Notification.permission; saveSettings(); } }catch(e){}
    scheduleActivityAnchor();
    document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible'){ scheduleActivityAnchor(); checkSmartReminders(); } });
    setInterval(checkSmartReminders, 60000);
    checkSmartReminders();
    render();
  </script>
</body>
</html>

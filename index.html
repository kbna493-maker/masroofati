<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>مصروفاتي</title>
  <style>
    

:root{
  --primary:#2563EB;
  --primary-dark:#1D4ED8;
  --primary-light:#DBEAFE;
  --text-dark:#0F172A;
  --text-muted:#64748B;
  --bg:#F6F8FC;
  --card:#FFFFFF;
  --border:#E5EAF3;
  --green:#22C55E;
  --red:#EF4444;
  --shadow-soft:0 10px 30px rgba(15,23,42,0.06);
}


/* Global */
body{
  background:linear-gradient(180deg,#F8FAFC 0%, #F1F5F9 100%);
  color:var(--text-dark);
}

/* Cards */
.card{
  background:rgba(255,255,255,0.92);
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(12px);
}

/* Main blue card */
.balance-card{
  background:linear-gradient(180deg,#2D6BEE 0%, #2563EB 60%, #1D4ED8 100%);
  color:white;
  border:none;
}

/* Buttons */
.fab{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);width:56px;height:56px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,var(--primary),var(--primary-dark)) !important;color:#fff !important;box-shadow:0 10px 22px rgba(37,99,235,0.24);opacity:1 !important;visibility:visible !important;z-index:120;filter:none !important}
.fab:hover{
  background:linear-gradient(180deg,var(--primary-dark),#1e40af);
}

/* Chips */
.chip{
  border:1px solid var(--border);
  background:#fff;
  color:var(--text-dark);
  border-radius:20px;
  box-shadow:0 6px 18px rgba(15,23,42,0.04);
}
.chip.active{
  background:linear-gradient(180deg,var(--primary),var(--primary-dark));
  color:#fff !important;
  border-color:transparent;
  box-shadow:0 12px 26px rgba(37,99,235,0.28);
  opacity:1 !important;
}

/* Inputs */
.input{
  border:1px solid var(--border);
  background:#fff;
  color:var(--text-dark);
  border-radius:20px;
  box-shadow:0 6px 18px rgba(15,23,42,0.04);
}

/* Text tweaks */
.section-title{
  color:var(--text-dark);
  font-weight:800;
  letter-spacing:-0.2px;
}

    body.dark{
      color-scheme: dark;
      --bg:#0f172a;--bg2:#111827;--card:#111827;--text:#f8fafc;--muted:#94a3b8;--border:#334155;
      --blue:#38bdf8;--blue2:#0ea5e9;--green:#22c55e;--orange:#fb923c;--danger:#ef4444;
      --shadow:0 12px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,var(--bg2),var(--bg));color:var(--text-dark);transition:background .2s ease,color .2s ease}
    body{min-height:100vh}
    button,input,textarea,select{font:inherit}
    .app{max-width:420px;min-height:100vh;margin:0 auto;background:var(--bg);position:relative;box-shadow:0 0 0 1px rgba(226,232,240,.2),0 25px 80px rgba(15,23,42,.12)}
    .screen{padding:16px 16px 96px;min-height:100vh}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .icon-btn{min-width:46px;height:46px;border-radius:18px;border:1px solid var(--border);background:var(--card);color:var(--text-dark);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 14px rgba(15,23,42,.05);padding:0 12px}
    .icon-btn.calendar-btn{gap:8px;min-width:94px}
    .title-wrap{text-align:center;flex:1}
    .title{margin:0;font-size:30px;font-weight:800}
    .subtitle{margin-top:4px;font-size:13px;color:var(--muted)}
    .days{display:flex;gap:8px;margin-top:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scroll-behavior:smooth}
    .days::-webkit-scrollbar{display:none}
    .day{min-width:52px;border:1px solid var(--border);background:var(--card);color:var(--text-dark);border-radius:16px;text-align:center;padding:10px 0;font-weight:700;font-size:13px;cursor:pointer;position:relative;transition:all .18s ease;flex:0 0 auto}

    .day.active{background:linear-gradient(180deg,var(--primary),var(--primary-dark)) !important;color:#fff !important;border-color:transparent !important;box-shadow:0 12px 26px rgba(37,99,235,0.28) !important}
    .day.active.today{box-shadow:0 0 0 3px rgba(15,23,42,.18)}
    .day-dot{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:#0f172a}
    body.dark .day-dot{background:#f8fafc}
    .day.active .day-dot{background:#fff}
    .card{background:var(--card);color:var(--text-dark);border:1px solid var(--border);border-radius:28px;box-shadow:0 14px 34px rgba(15,23,42,.07)}
    .balance-card{margin-top:16px;background:
      radial-gradient(circle at top right, rgba(255,255,255,.20), transparent 28%),
      linear-gradient(135deg,#38bdf8 0%,#0ea5e9 52%,#0284c7 100%);
      color:#fff;border:none;border-radius:28px;box-shadow:0 18px 40px rgba(14,165,233,.24);overflow:hidden}
    .balance-inner{display:grid;grid-template-columns:1fr 1px 1fr;gap:16px;padding:18px;align-items:start}
    .currency-right{text-align:right;padding-left:4px}
    .currency-left{text-align:left;padding-right:4px}
    .balance-sep{width:1px;background:rgba(255,255,255,.35);border-radius:999px;align-self:stretch}
    .currency-label{font-size:14px;opacity:.98;font-weight:800;display:flex;align-items:center;gap:6px}
    .currency-balance{font-size:26px;font-weight:900;margin-top:10px;min-height:34px;letter-spacing:.3px}
    .stats-block{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.22)}
    .income{margin-top:6px;color:#f0f9ff;font-size:13px}
    .expense{margin-top:4px;color:#ffe4e6;font-size:13px}
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-top:22px}

    .chip{border:1px solid var(--border);background:#fff;color:var(--text-dark);border-radius:18px;padding:12px 16px;cursor:pointer;box-shadow:0 6px 16px rgba(15,23,42,.04);opacity:1 !important}

    .intro-box{width:100%;max-width:360px}

    .cat-icon{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:999px;font-size:12px;color:#fff}

    .search-input{padding-right:40px;background-image:none}

    .switch{position:relative;display:inline-block;width:50px;height:28px}
    .switch input{opacity:0;width:0;height:0}
    .slider{position:absolute;cursor:pointer;inset:0;background:#94a3b8;transition:.2s;border-radius:999px}
    .slider:before{position:absolute;content:"";height:22px;width:22px;right:3px;top:3px;background:white;transition:.2s;border-radius:50%}
    .switch input:checked + .slider{background:#2563eb}
    .switch input:checked + .slider:before{transform:translateX(-22px)}
  
    .modal.pretty{max-width:380px;border-radius:30px;padding:22px}
    .modal-title.pretty-title{font-size:24px;margin-bottom:8px}

    .modal-actions.pretty-actions{justify-content:flex-end;margin-top:22px}
    .btn-cancel,.btn-confirm,.btn-soft{border-radius:18px;padding:14px 22px;font-weight:800;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text-dark);box-shadow:var(--shadow)}

    .btn-soft{background:linear-gradient(180deg,#3b82f6,#2563eb);color:#fff;border-color:#2563eb}

<body>
  <div id="app"></div>
  <div id="successOverlay" class="success-overlay"><div class="success-mark-wrap"><div class="success-mark">✓</div></div></div>
  <script>
    const STORAGE_KEY='masrofi_direct_transactions_v9';
    const INTRO_KEY='masrofi_direct_intro_v9';
    const SETTINGS_KEY='masroofati_settings_v31';
    const DEBTS_KEY='masroofati_debts_v31';
    const PEOPLE_KEY='masroofati_people_v39';

    function playSuccessSound(){
      try{
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if(!AudioCtx) return;
        const ctx = window.__masroofatiAudioCtx || new AudioCtx();
        window.__masroofatiAudioCtx = ctx;

        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = 'square';
        osc.frequency.setValueAtTime(620, now);
        osc.frequency.linearRampToValueAtTime(920, now + 0.08);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.38, now + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start(now);
        osc.stop(now + 0.22);
      }catch(e){}
    }

    function fmt(n,currency){
      const value=Number(n||0);
      const text=Number.isInteger(value)?value.toLocaleString('en-US'):value.toLocaleString('en-US',{maximumFractionDigits:2});
      return currency==='SYP'?`${text} ل.س`:`${text} $`;
    }
    function sameDay(a,b){
      const da=new Date(a), db=new Date(b);
      return da.getFullYear()===db.getFullYear() && da.getMonth()===db.getMonth() && da.getDate()===db.getDate();
    }
    function sameMonth(a,b){
      const da=new Date(a), db=new Date(b);
      return da.getFullYear()===db.getFullYear() && da.getMonth()===db.getMonth();
    }
    function debtDateLabel(iso){

    function dayLabel(iso){
      const d=new Date(iso), now=new Date(), y=new Date();
      y.setDate(now.getDate()-1);
      if(sameDay(d,now)) return 'اليوم';
      if(sameDay(d,y)) return 'أمس';
      return d.toLocaleDateString('en-GB');
    }
    function topDateLabel(date){ return `${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`; }
    function calc(currency,dateRef=selectedDate){
      const list=transactions.filter(t=>t.currency===currency);
      const income=list.filter(t=>t.type==='INCOME').reduce((s,t)=>s+t.amount,0);
      const expense=list.filter(t=>t.type==='EXPENSE').reduce((s,t)=>s+t.amount,0);
      const dayIncome=list.filter(t=>t.type==='INCOME' && sameDay(t.createdAt,dateRef)).reduce((s,t)=>s+t.amount,0);
      const dayExpense=list.filter(t=>t.type==='EXPENSE' && sameDay(t.createdAt,dateRef)).reduce((s,t)=>s+t.amount,0);
      const monthIncome=list.filter(t=>t.type==='INCOME' && sameMonth(t.createdAt,dateRef)).reduce((s,t)=>s+t.amount,0);
      const monthExpense=list.filter(t=>t.type==='EXPENSE' && sameMonth(t.createdAt,dateRef)).reduce((s,t)=>s+t.amount,0);
      return {balance:income-expense,dayIncome,dayExpense,monthIncome,monthExpense};
    }

        toMeUSD:list.filter(d=>d.kind==='TO_ME'&&d.currency==='USD').reduce((s,d)=>s+d.amount,0),
        onMeSYP:list.filter(d=>d.kind==='ON_ME'&&d.currency==='SYP').reduce((s,d)=>s+d.amount,0),
        onMeUSD:list.filter(d=>d.kind==='ON_ME'&&d.currency==='USD').reduce((s,d)=>s+d.amount,0)
      };
    }
    function uniquePeople(){

    function sortDebtsForView(list){
      return list.slice().sort((a,b)=>{
        if(!!a.paid !== !!b.paid) return a.paid ? 1 : -1;
        if(a.paid && b.paid){
          const ap = a.paidAt ? new Date(a.paidAt).getTime() : 0;
          const bp = b.paidAt ? new Date(b.paidAt).getTime() : 0;
          return bp - ap;
        }
        return new Date(b.date).getTime() - new Date(a.date).getTime();
      });
    }

      const people = uniquePeople()
        .filter(name=>{
          const hay=name.toLowerCase();
          const matchesQuery = !query || hay.includes(query) || debts.some(d=>d.personName===name && ((d.reason||'')+' '+(d.customReason||'')).toLowerCase().includes(query));
          const matchesKind = debtKindFilter==='ALL' || debts.some(d=>d.personName===name && d.kind===debtKindFilter && !d.paid);
          return matchesQuery && matchesKind;
        })
        .sort((a,b)=>{
          const debtsA = debts.filter(d=>d.personName===a);
          const debtsB = debts.filter(d=>d.personName===b);
          const aActive = debtsA.some(d=>!d.paid);
          const bActive = debtsB.some(d=>!d.paid);
          const aHasAny = debtsA.length > 0;
          const bHasAny = debtsB.length > 0;
          const aScore = aActive ? 3 : (aHasAny ? 2 : 1);
          const bScore = bActive ? 3 : (bHasAny ? 2 : 1);
          if (aScore !== bScore) return bScore - aScore;
          if (aScore === 3) {
            const aNewestActive = Math.max(...debtsA.filter(d=>!d.paid).map(d=>new Date(d.date).getTime()));
            const bNewestActive = Math.max(...debtsB.filter(d=>!d.paid).map(d=>new Date(d.date).getTime()));
            if (aNewestActive !== bNewestActive) return bNewestActive - aNewestActive;
          }
          if (aScore === 2) {
            const aNewestAny = Math.max(...debtsA.map(d=>new Date(d.paidAt || d.date).getTime()));
            const bNewestAny = Math.max(...debtsB.map(d=>new Date(d.paidAt || d.date).getTime()));
            if (aNewestAny !== bNewestAny) return bNewestAny - aNewestAny;
          }
          return a.localeCompare(b,'ar');
        });

function bindAddForm(){
      const form=document.getElementById('txForm');
      if(!form) return;
      const editing = editingId!=null ? transactions.find(t=>t.id===editingId) : null;
      let type=editing ? editing.type : 'EXPENSE';
      let currency=editing ? editing.currency : 'SYP';
      let category=editing ? editing.category : 'قهوة';
      const categoriesWrap=document.getElementById('categories');
      const customWrap=document.getElementById('customCategoryWrap');
      const customInput=document.getElementById('customCategory');

      function renderCategories(){
        const list=type==='EXPENSE' ? expenseCategories : incomeCategories;
        if(!list.includes(category)) category=list[0];
        categoriesWrap.innerHTML=list.map(c=>'<button type="button" class="chip small active-cat '+(c===category?'active':'')+'" data-value="'+c+'">'+iconBadge(c)+' <span>'+c+'</span></button>').join('');
        customWrap.style.display = category==='أخرى' ? 'block' : 'none';
        categoriesWrap.querySelectorAll('.active-cat').forEach(btn=>{
          btn.addEventListener('click', ()=>{ category=btn.dataset.value; renderCategories(); });
        });
      }

      form.querySelectorAll('[data-type]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          type=btn.dataset.type;
          form.querySelectorAll('[data-type]').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          const list=type==='EXPENSE' ? expenseCategories : incomeCategories;
          if(!list.includes(category)) category=list[0];
          renderCategories();
        });
      });
      form.querySelectorAll('[data-currency]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          currency=btn.dataset.currency;
          form.querySelectorAll('[data-currency]').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
        });
      });

      renderCategories();

      form.addEventListener('submit', (e)=>{
        e.preventDefault();
        const amount=Number((document.getElementById('amount').value || '').replace(/[^0-9.]/g,''));
        const note=(document.getElementById('note').value || '').trim();
        const customName=(customInput.value || '').trim();
        if(!amount || amount<=0) return;
        saveTransaction({type,currency,amount,category,note,customName: category==='أخرى' ? customName : ''});
      });
    }

      const reasonsWrap=document.getElementById('debtReasonsWrap');
      const customWrap=document.getElementById('customReasonWrap2');
      const customInput=document.getElementById('customReason2');

      function renderReasons(){
        if(!debtReasons.includes(reason)) reason='قرض';
        reasonsWrap.innerHTML=debtReasons.map(c=>'<button type="button" class="chip small active-reason '+(c===reason?'active':'')+'" data-value="'+c+'">'+iconBadge(c)+' <span>'+c+'</span></button>').join('');
        customWrap.style.display = reason==='أخرى' ? 'block' : 'none';
        reasonsWrap.querySelectorAll('.active-reason').forEach(btn=>{
          btn.addEventListener('click', ()=>{ reason=btn.dataset.value; renderReasons(); });
        });
      }

      form.querySelectorAll('[data-kind]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          kind=btn.dataset.kind;
          form.querySelectorAll('[data-kind]').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
      form.querySelectorAll('[data-currency]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          currency=btn.dataset.currency;
          form.querySelectorAll('[data-currency]').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
        });
      });

      renderReasons();

      form.addEventListener('submit', (e)=>{
        e.preventDefault();
        const personName=(document.getElementById('personName').value || '').trim();
        const amount=Number((document.getElementById('debtAmount').value || '').replace(/[^0-9.]/g,''));
        const dateValue=(document.getElementById('debtDate').value || selectedDate.toISOString().slice(0,10));
        const customReason=(customInput.value || '').trim();
        if(!personName){ showToast('اكتب اسم الشخص'); return; }
        if(!amount || amount<=0){ showToast('أدخل مبلغًا صحيحًا'); return; }
        saveDebt({personName, amount, currency, kind, reason, date:new Date(dateValue).toISOString(), customReason: reason==='أخرى' ? customReason : '', paid: editing ? editing.paid : false, paidAt: editing ? editing.paidAt || null : null});
      });
    }

    function setupDaysStrip(){
      const strip=document.querySelector('.days');
      const active=document.querySelector('.day.active');
      if(!strip || !active) return;
      const monthKey=selectedDate.getFullYear()+'-'+selectedDate.getMonth();
      if(lastRenderedMonthKey!==monthKey){
        lastRenderedMonthKey=monthKey;
        const targetLeft=active.offsetLeft - (strip.clientWidth/2) + (active.clientWidth/2);
        strip.scrollLeft=targetLeft;
        dayStripScrollLeft=strip.scrollLeft;
      }else{
        strip.scrollLeft=dayStripScrollLeft;
      }
      strip.addEventListener('scroll', ()=>{ dayStripScrollLeft=strip.scrollLeft; }, {passive:true});
    }
    function applyTheme(){ document.body.classList.toggle('dark', !!settings.darkMode); }

    function render(){
      applyTheme();
      if(showIntro){ app.innerHTML=introView(); return; }
      if(screen==='add'){ app.innerHTML=addView(); bindAddForm(); return; }
      if(screen==='addDebt'){ app.innerHTML=addDebtView(); bindDebtForm(); return; }
      if(screen==='addPerson'){ app.innerHTML=addPersonView(); return; }
      if(screen==='reports'){ app.innerHTML=reportsView(); return; }
      if(screen==='debts'){
        app.innerHTML=debtsView();
        if(shouldRefocusDebtSearch){
          const input=document.getElementById('debtSearchInput');
          if(input){ input.focus(); try{ input.setSelectionRange(debtCursorPos, debtCursorPos); }catch(e){} }
          shouldRefocusDebtSearch=false;
        }
        return;
      }
      if(screen==='person'){ app.innerHTML=personView(); return; }
      if(screen==='history'){
        app.innerHTML=historyView();
        if(shouldRefocusSearch){
          const input=document.getElementById('historySearchInput');
          if(input){
            input.focus();
            try{ input.setSelectionRange(historyCursorPos, historyCursorPos); }catch(e){}
          }
          shouldRefocusSearch=false;
        }
        return;
      }
      if(screen==='settings'){ app.innerHTML=settingsView(); return; }
      app.innerHTML=homeView();
      setupDaysStrip();
    }

window.setScreen=setScreen;
    window.goBack=goBack;
    window.startApp=startApp;
    window.requestDelete=requestDelete;
    window.startEditDebt=startEditDebt;
    window.markDebtPaid=markDebtPaid;
    window.cancelDelete=cancelDelete;
    window.confirmDelete=confirmDelete;
    window.startEdit=startEdit;
    window.setSelectedDate=setSelectedDate;
    window.goToday=goToday;
    window.openMonthModal=openMonthModal;
    window.closeMonthModal=closeMonthModal;
    window.setMonth=setMonth;
    window.toggleSettings=toggleSettings;
    window.updateSetting=updateSetting;
    window.setHistorySearch=setHistorySearch;
    window.setDebtSearch=setDebtSearch;
    window.selectDebtSuggestion=selectDebtSuggestion;
    window.setDebtKindFilter=setDebtKindFilter;
    window.openAddDebt=openAddDebt;
    window.openAddTransaction=openAddTransaction;
    window.openAddPerson=openAddPerson;
    window.savePersonPage=savePersonPage;
    window.openAddDebtForPerson=openAddDebtForPerson;
    window.openPerson=openPerson;
    window.setPersonDebtTab=setPersonDebtTab;
window.requestDeletePerson=requestDeletePerson;
window.cancelDeletePerson=cancelDeletePerson;
window.confirmDeletePerson=confirmDeletePerson;
window.requestSettleDebt=requestSettleDebt;
window.cancelSettleDebt=cancelSettleDebt;
window.confirmSettleDebt=confirmSettleDebt;

    render();
  </script>

</body>
